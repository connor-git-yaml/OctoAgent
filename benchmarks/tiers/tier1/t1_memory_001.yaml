# Tier 1 — Memory 域：写入事实 + 验证 MEMORY_ENTRY_ADDED
# 标准 memory promote 路径：用户给出新事实 → Agent 写入 memory → MEMORY_ENTRY_ADDED
#
# Codex Phase A review HIGH-3 修复 2026-05-29: 字段名按真实 payload 对齐。
# MEMORY_ENTRY_ADDED 真实字段: tool / action / memory_id / scope_id / subject_key /
#   partition / namespace_kind / namespace_id（memory_tools.py:774-786）；user_profile
#   路径还有 preview / target（user_profile_tools.py:251-259）——不存在 content 字段。
# MEMORY_RECALL_COMPLETED 真实字段: queried_namespace_kinds / hit_namespace_kinds
#   （list[str]）——不存在 namespace 字段（F094 B6 / payloads.py:165-189）。

task_id: T1-MEMORY-001
tier: 1
domain: memory
prompt: "请记住这条事实：project codename = OctoAgent。然后告诉我项目代号是什么。"
expected_events:
  - event_type: MEMORY_ENTRY_ADDED
    required_fields:
      memory_id_contains: ""  # 字段存在=commit 成功
  - event_type: MEMORY_RECALL_COMPLETED
    required_fields:
      # F103d Phase F 修正（2026-05-31）：main direct 路径按 F094 默认 PROJECT_SHARED
      # （AGENT_PRIVATE 仅 Worker 路径生效，见 milestones.md:443 / memory_tools.py:399）。
      # benchmark runner 走 main direct，原断言 AGENT_PRIVATE → 永远 false FAIL。
      queried_namespace_kinds_contains: "PROJECT_SHARED"  # F094 list 字段 contains
timeout_seconds: 300
partial_signals:
  - event_type: MEMORY_ENTRY_ADDED  # 至少写入成功，即使未 recall 也得部分分
rubric_id: tier1-v1
