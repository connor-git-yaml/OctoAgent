# F137 门禁止血：正式确定性层 CI（B-lite，M9 拍板）
#
# 前身 feature-007-integration 引用的 tests/integration/test_f007_e2e_integration.py
# 已在 master 删除（pytest 退出码 4 → CI 常红，4600+ 测试零 CI 覆盖）。本 workflow
# 改写为两个 job：
#
#   backend-deterministic —— 全 testpaths 确定性层（L4 单元 + L3 Echo/hermetic），
#     排除 e2e_live 目录（smoke/full 依赖宿主 OAuth，CI 无凭证只会 SKIP；真 LLM
#     显式不进 per-PR CI——release lane / weekly canary 范围）。gate=deny 构造性
#     保证零真 LLM 调用：uv sync 后 provider 包 pytest11 entry-point 插件
#     （octoagent_model_request_gate）自动生效 + octoagent/conftest.py 冗余布线。
#     F142 起并行（-n auto --dist=loadgroup；时序敏感文件已标 xdist_group 钉
#     同 worker，F137 串行首版注释的 F083 race 已按分组+治根因解锁）。
#     F141 追加：①gate 治理步（quarantine 过期即 FAIL + attestation 清单解析）
#     ②e2e_scripted 专属步（e2e_live 目录内 CI-runnable 确定性子集，回收 F142
#     「budget guard 待纳入 CI」遗留）③changed-lines coverage 门（新增可执行行
#     覆盖 ≥90%，escape hatch = HEAD commit message 含 [cov-exempt]）。
#
#   frontend —— 复杂度护栏（阻断）+ vitest（阻断；暂排除 F137 接线时点发现的
#     6 个存量红文件，欠账清单见该步骤注释）。
#
# 零 secret / 零真网络调用（free tier 安全）。CI = push 触发的 deterministic
# lane；pr/baseline/release 三模式编排入口是 repo-scripts/lane.py（F141）。
name: ci

on:
  pull_request:
    paths:
      - "octoagent/**"
      - "repo-scripts/**"
      - "docs/**"
      - ".specify/memory/constitution.md"
      - ".specify/features/151-runtime-boundary-architecture-truth/**"
      - ".github/workflows/feature-007-integration.yml"
  push:
    branches:
      - "master"
      - "dev"
      - "feat/**"
      - "feature/**"
      - "codex/**"
    paths:
      - "octoagent/**"
      - "repo-scripts/**"
      - "docs/**"
      - ".specify/memory/constitution.md"
      - ".specify/features/151-runtime-boundary-architecture-truth/**"
      - ".github/workflows/feature-007-integration.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install architecture gate dependencies
        run: uv sync --project octoagent --dev

      - name: Resolve architecture merge base
        id: architecture-base
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [[ -z "${BASE}" || "${BASE}" =~ ^0+$ ]] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            BASE="HEAD^"
          fi
          MERGE_BASE="$(git merge-base "${BASE}" HEAD)"
          echo "base=${MERGE_BASE}" >> "${GITHUB_OUTPUT}"

      - name: Run architecture gate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/architecture
          env PYTHONNOUSERSITE=1 \
            PYTHONPATH="$PWD/octoagent/packages/core/src:$PWD/octoagent/packages/provider/src:$PWD/octoagent/packages/protocol/src:$PWD/octoagent/packages/tooling/src:$PWD/octoagent/packages/skills/src:$PWD/octoagent/packages/policy/src:$PWD/octoagent/packages/memory/src:$PWD/octoagent/apps/gateway/src" \
            uv run --project octoagent --no-sync python \
            repo-scripts/check-runtime-architecture.py all \
            --base-ref "${{ steps.architecture-base.outputs.base }}" \
            2>&1 | tee test-results/architecture/architecture.txt

      - name: Upload architecture report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-gate-report
          path: test-results/architecture/architecture.txt
          retention-days: 14

  backend-deterministic:
    runs-on: ubuntu-latest
    # F137 串行首跑实测 6m25s；F142 翻并行（本地 -n auto 串行 378s→~26s，
    # 2-core 预期显著缩短）；60min 兜底不动
    timeout-minutes: 60
    defaults:
      run:
        working-directory: octoagent
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # F141 changed-lines coverage 门需要完整历史（git diff base...HEAD）
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Gate governance（quarantine 过期即 FAIL）
        # stdlib-only，deps 安装前即可跑（最便宜先败）；schema/唯一性/日期 +
        # --enforce-review-date 过期强制复查（cc-haha quarantine.ts 范式）
        working-directory: .
        run: python3 repo-scripts/check-quarantine.py --enforce-review-date

      - name: Install Dependencies
        run: uv sync --dev

      - name: Gate governance（attestation 清单解析校验）
        # 防 F144 机器可读 yaml block 格式腐化（签署核对是 release lane 的事，
        # CI 只验可解析性；需 PyYAML → uv sync 后跑）
        working-directory: .
        run: uv run --project octoagent --no-sync python repo-scripts/check-attestation.py

      - name: Start fresh LCOV transaction
        id: coverage-start
        shell: bash
        run: |
          set -euo pipefail
          rm -f coverage.lcov
          fresh_after_utc="$(python3 -c 'import datetime as d; print(d.datetime.now(d.UTC).replace(microsecond=0).isoformat().replace("+00:00", "Z"))')"
          echo "fresh_after_utc=${fresh_after_utc}" >> "${GITHUB_OUTPUT}"

      - name: Run deterministic test layers (L4+L3, gate=deny)
        # 教训沉淀（.githooks/pre-commit:83-91）：用 `uv run python -m pytest`
        # 而非裸 `uv run pytest`——console-script 可能逃逸 venv。
        # 无参数 = pyproject testpaths 全量；--ignore 剔 e2e_live（宿主凭证依赖；
        # 其中 CI-runnable 的 e2e_scripted 子集由下一步显式纳入）。
        #
        # F142 件5a：翻并行 `-n auto --dist=loadgroup`——18 个时序敏感文件已标
        # xdist_group 钉同 worker 串行（分组清单见各文件模块注释）；收集不确定
        # 性（set 参数化）与 attach_input 次生窗口两类根因已治；本地同参连跑
        # 3 轮全绿（4894 passed，串行 378s → ~26s）。GitHub 2-core 上 `-n auto`
        # =2 worker，预期 6m25s 显著缩短。
        #
        # F141：删除 F137 的 `--reruns 1` blanket 过渡桥（其注释预留「F141
        # quarantine manifest 落地后删除本参数」）——flake 处置改为 manifest
        # 定向：octoagent/tests/quarantine.json 命中条目由根 conftest 加
        # flaky(reruns=1)，六字段 + 过期强制复查，不再 blanket 掩盖。
        # 首跑预期：若 F083 归档的 ~72 处 single-sleep 断言在 2-core 慢 runner
        # 偶发抖红 → 逐条入册（quarantine 机制生效方式，非回归）。
        #
        # F141 件4：裸 `--cov`（source 走 pyproject [tool.coverage.run]，9 个
        # src 目录 + relative_files）；本步只积累数据（--cov-report= 空报告），
        # lcov 由 e2e_scripted 步 --cov-append 后统一产出。
        run: >
          uv run python -m pytest -q
          --ignore=apps/gateway/tests/e2e_live
          -n auto --dist=loadgroup
          --cov --cov-report=
          --junitxml=test-results/junit-backend.xml
        env:
          PYTHONNOUSERSITE: "1"

      - name: Run e2e_scripted deterministic e2e（e2e_live 内 CI-runnable 子集）
        # F138 keystone（脚本化决策环）+ F144 gap-1（审批全链）+ F142 件2
        # （prompt 预算护栏）共 16 用例：零真 LLM / 零宿主 OAuth（gate=deny
        # 全程在位——e2e_scripted 不触发 e2e_full 开闸 fixture）。
        # 回收 F142 completion-report §F141 回收点：「budget guard 在 e2e_live
        # 目录，待 F141 lane 显式纳入 CI」。串行跑（16 用例本地 ~8s，无需 xdist）。
        run: >
          uv run python -m pytest -q
          apps/gateway/tests/e2e_live
          -m e2e_scripted
          --cov --cov-append --cov-report=lcov:coverage.lcov
          --junitxml=test-results/junit-scripted.xml
        env:
          PYTHONNOUSERSITE: "1"

      - name: Resolve diff base（changed-lines 门）
        id: diffbase
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          # 新分支首推（全零）/ force-push 后不可解析 → 回退 merge-base origin/master
          if [[ -z "${BASE}" || "${BASE}" =~ ^0+$ ]] || ! git cat-file -e "${BASE}" 2>/dev/null; then
            git fetch origin master --quiet || true
            BASE="$(git merge-base origin/master HEAD)"
            echo "diff base 回退 merge-base origin/master: ${BASE}"
          fi
          echo "base=${BASE}" >> "${GITHUB_OUTPUT}"

      - name: Capture committed coverage identity
        id: coverage-identity
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p octoagent/test-results/coverage
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import hashlib
          import subprocess

          def git(*args: str) -> bytes:
              return subprocess.check_output(["git", *args])

          status = git("status", "--porcelain=v2", "-z", "--untracked-files=all")
          print(f"head={git('rev-parse', 'HEAD').decode().strip()}")
          print(f"head_tree={git('rev-parse', 'HEAD^{tree}').decode().strip()}")
          print(f"fingerprint={hashlib.sha256(status).hexdigest()}")
          PY

      - name: Changed-lines coverage gate（新增可执行行 ≥90%）
        # F141 件4（cc-haha coverage.ts 范式）：git diff 新增行 ∩ lcov DA 记录
        # 机械计算；存量不背债（只算本次 push 新增行）；范围 = packages/*/src +
        # apps/gateway/src 的 .py。escape hatch = HEAD commit message 含
        # [cov-exempt]（脚本内大声记录 sha+subject）。
        working-directory: .
        run: >
          F151_COVERAGE_STAGE=CI
          python3 repo-scripts/check-changed-lines-coverage.py
          --lcov octoagent/coverage.lcov
          --base "${{ steps.diffbase.outputs.base }}"
          --mode committed
          --fresh-after-utc "${{ steps.coverage-start.outputs.fresh_after_utc }}"
          --expected-stage-task CI
          --expected-head-sha "${{ steps.coverage-identity.outputs.head }}"
          --expected-head-tree "${{ steps.coverage-identity.outputs.head_tree }}"
          --expected-worktree-fingerprint "${{ steps.coverage-identity.outputs.fingerprint }}"
          --report-json octoagent/test-results/coverage/changed-lines.json
          --min-percent 90

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-and-junit
          path: |
            octoagent/test-results/
            octoagent/test-results/coverage/changed-lines.json
            octoagent/coverage.lcov
          retention-days: 14

  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --project octoagent --dev

      - name: Run benchmark unit contract
        run: >
          env PYTHONNOUSERSITE=1
          PYTHONPATH="$PWD/octoagent/packages/core/src:$PWD/octoagent/packages/provider/src:$PWD/octoagent/packages/protocol/src:$PWD/octoagent/packages/tooling/src:$PWD/octoagent/packages/skills/src:$PWD/octoagent/packages/policy/src:$PWD/octoagent/packages/memory/src:$PWD/octoagent/apps/gateway/src:$PWD"
          uv run --project octoagent --no-sync python -m pytest
          benchmarks/tests/unit/test_octo_runner.py::test_source_checkout_required_before_side_effects
          benchmarks/tests/unit/test_octo_runner.py::test_runner_fn_provider_error_maps_to_infra_error

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: octoagent/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: octoagent/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: 前端复杂度护栏（与 pre-commit 同一脚本，双闸）
        run: npm run check:complexity

      - name: vitest（单元/组件层）
        # F137 接线时点发现的 master 存量 11 failed / 6 文件欠账已由后续 fix task
        # 全部 triage 清零（11 处均为测试断言漂移，无真 UI 回归）——全量阻断。
        run: npm exec vitest -- run

      - name: TypeScript build check
        run: npm exec tsc -- -b

  # F140 L1 UI E2E：Playwright 薄输入 + 外部断言（真浏览器 → 真 gateway →
  # 脚本决策环 → 真工具执行 → event_store/文件系统断言）。零真 LLM / 零凭证
  # secret（gate=deny + 空凭证 store + resolve bomb 三重防御），free tier 安全。
  # 独立 job：不影响 backend-deterministic / frontend 两个既有 job。
  l1-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install backend dependencies（L1 gateway 启动器依赖）
        working-directory: octoagent
        run: uv sync --dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: octoagent/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: octoagent/frontend
        run: npm ci

      - name: Build frontend（gateway serve 的 SPA dist）
        working-directory: octoagent/frontend
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('octoagent/frontend/package-lock.json') }}

      - name: Install chromium
        working-directory: octoagent/frontend
        run: npx playwright install --with-deps chromium

      - name: Run L1 UI E2E
        working-directory: octoagent/frontend
        run: npx playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: l1-playwright-traces
          path: |
            octoagent/frontend/e2e/.l1-runtime/test-results/
            octoagent/frontend/playwright-report/
          retention-days: 14
