# F137 门禁止血：正式确定性层 CI（B-lite，M9 拍板）
#
# 前身 feature-007-integration 引用的 tests/integration/test_f007_e2e_integration.py
# 已在 master 删除（pytest 退出码 4 → CI 常红，4600+ 测试零 CI 覆盖）。本 workflow
# 改写为两个 job：
#
#   backend-deterministic —— 全 testpaths 确定性层（L4 单元 + L3 Echo/hermetic），
#     排除 e2e_live 目录（smoke/full 依赖宿主 OAuth，CI 无凭证只会 SKIP；真 LLM
#     显式不进 per-PR CI——F141 weekly canary 范围）。gate=deny 构造性保证零真
#     LLM 调用：uv sync 后 provider 包 pytest11 entry-point 插件
#     （octoagent_model_request_gate）自动生效 + octoagent/conftest.py 冗余布线。
#     F142 起并行（-n auto --dist=loadgroup；时序敏感文件已标 xdist_group 钉
#     同 worker，F137 串行首版注释的 F083 race 已按分组+治根因解锁）。
#
#   frontend —— 复杂度护栏（阻断）+ vitest（阻断；暂排除 F137 接线时点发现的
#     6 个存量红文件，欠账清单见该步骤注释）。
#
# 零 secret / 零真网络调用（free tier 安全）。lane 分层（pr/baseline/release）
# 是 F141 主责，本 workflow 保持单一 deterministic lane 为其留扩展缝。
name: ci

on:
  pull_request:
    paths:
      - "octoagent/**"
      - "repo-scripts/**"
      - ".github/workflows/feature-007-integration.yml"
  push:
    branches:
      - "master"
      - "dev"
      - "feat/**"
      - "feature/**"
      - "codex/**"
    paths:
      - "octoagent/**"
      - "repo-scripts/**"
      - ".github/workflows/feature-007-integration.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-deterministic:
    runs-on: ubuntu-latest
    # F137 串行首跑实测 6m25s；F142 翻并行（本地 -n auto 串行 378s→~26s，
    # 2-core 预期显著缩短）；60min 兜底不动
    timeout-minutes: 60
    defaults:
      run:
        working-directory: octoagent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --dev

      - name: Run deterministic test layers (L4+L3, gate=deny)
        # 教训沉淀（.githooks/pre-commit:83-91）：用 `uv run python -m pytest`
        # 而非裸 `uv run pytest`——console-script 可能逃逸 venv。
        # 无参数 = pyproject testpaths 全量；--ignore 剔 e2e_live（宿主凭证依赖）。
        #
        # F142 件5a：翻并行 `-n auto --dist=loadgroup`——18 个时序敏感文件已标
        # xdist_group 钉同 worker 串行（分组清单见各文件模块注释）；收集不确定
        # 性（set 参数化）与 attach_input 次生窗口两类根因已治；本地同参连跑
        # 3 轮全绿（4894 passed，串行 378s → ~26s）。GitHub 2-core 上 `-n auto`
        # =2 worker，预期 6m25s 显著缩短。
        #
        # --reruns 1（Codex Final P1-2，仅 CI lane）：全仓剩余 single-sleep
        # timing 断言（octoagent/pyproject.toml F083 归档的已知债，F142 已治
        # 最热的 task_runner/f009/f131 三处）在 GitHub 2-core 慢 runner 上仍可能
        # 间歇抖红。单次 rerun 是显式过渡桥（junit 可见 rerun 计数，持续失败
        # 仍红）——F141 quarantine manifest 落地后删除本参数。本地跑保持无
        # rerun，开发者仍看得见 flake。
        run: >
          uv run python -m pytest -q
          --ignore=apps/gateway/tests/e2e_live
          -n auto --dist=loadgroup
          --reruns 1 --reruns-delay 2
          --junitxml=test-results/junit-backend.xml
        env:
          PYTHONNOUSERSITE: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit
          path: octoagent/test-results/
          retention-days: 14

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: octoagent/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: octoagent/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: 前端复杂度护栏（与 pre-commit 同一脚本，双闸）
        run: npm run check:complexity

      - name: vitest（单元/组件层）
        # F137 接线时点发现的 master 存量 11 failed / 6 文件欠账已由后续 fix task
        # 全部 triage 清零（11 处均为测试断言漂移，无真 UI 回归）——全量阻断。
        run: npx vitest run

  # F140 L1 UI E2E：Playwright 薄输入 + 外部断言（真浏览器 → 真 gateway →
  # 脚本决策环 → 真工具执行 → event_store/文件系统断言）。零真 LLM / 零凭证
  # secret（gate=deny + 空凭证 store + resolve bomb 三重防御），free tier 安全。
  # 独立 job：不影响 backend-deterministic / frontend 两个既有 job。
  l1-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install backend dependencies（L1 gateway 启动器依赖）
        working-directory: octoagent
        run: uv sync --dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: octoagent/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: octoagent/frontend
        run: npm ci

      - name: Build frontend（gateway serve 的 SPA dist）
        working-directory: octoagent/frontend
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('octoagent/frontend/package-lock.json') }}

      - name: Install chromium
        working-directory: octoagent/frontend
        run: npx playwright install --with-deps chromium

      - name: Run L1 UI E2E
        working-directory: octoagent/frontend
        run: npx playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: l1-playwright-traces
          path: |
            octoagent/frontend/e2e/.l1-runtime/test-results/
            octoagent/frontend/playwright-report/
          retention-days: 14
