[project]
name = "octoagent-protocol"
version = "0.1.0"
description = "OctoAgent Protocol - A2A-Lite envelope + state mapper"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10,<3.0",
    "octoagent-core",
]

[tool.uv.sources]
octoagent-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/octoagent"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]
