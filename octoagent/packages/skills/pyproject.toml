[project]
name = "octoagent-skills"
version = "0.1.0"
description = "OctoAgent Skills - SkillManifest + SkillRunner + SkillRegistry"
requires-python = ">=3.12"
dependencies = [
    "octoagent-core",
    "octoagent-tooling",
    "pydantic>=2.10,<3.0",
    "structlog>=25.1,<26.0",
]

[tool.uv.sources]
octoagent-core = { workspace = true }
octoagent-tooling = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/octoagent"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]
