[project]
name = "octoagent-memory"
version = "0.1.0"
description = "OctoAgent Memory - SoR / Fragments / Vault + arbitration"
requires-python = ">=3.12"
dependencies = [
    "octoagent-core",
    "pydantic>=2.10,<3.0",
    "aiosqlite>=0.21,<1.0",
    "python-ulid>=3.1,<4.0",
    "structlog>=25.1,<26.0",
    "httpx>=0.27,<1.0",
]

[tool.uv.sources]
octoagent-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/octoagent"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]
