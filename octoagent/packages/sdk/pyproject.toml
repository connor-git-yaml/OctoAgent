[project]
name = "octoagent-sdk"
version = "0.1.0"
description = "OctoAgent SDK — 轻量级 Agent 框架，3 行代码创建智能 Agent"
requires-python = ">=3.12"
dependencies = [
    "octoagent-core",
    "octoagent-provider",
    "octoagent-tooling",
    "octoagent-skills",
    "structlog>=25.1,<26.0",
]

[project.optional-dependencies]
memory = ["octoagent-memory"]
policy = ["octoagent-policy"]
all = ["octoagent-memory", "octoagent-policy"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[tool.uv.sources]
octoagent-core = { workspace = true }
octoagent-provider = { workspace = true }
octoagent-tooling = { workspace = true }
octoagent-skills = { workspace = true }
octoagent-memory = { workspace = true }
octoagent-policy = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/octoagent_sdk"]
