[project]
name = "octoagent"
version = "0.1.0"
description = "OctoAgent - Personal AI OS (M0 Foundation)"
requires-python = ">=3.12"
readme = "README.md"
license = {text = "MIT"}
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "httpx>=0.27",
    "keyring>=25.0,<26.0",
    "ruff",
    "aiosqlite>=0.21",
    "octoagent-core",
    "octoagent-provider",
    "octoagent-gateway",
    "octoagent-tooling",
    "octoagent-skills",
    "octoagent-policy",
    "octoagent-memory",
    "octoagent-protocol",
    "octoagent-sdk",
    "pytest-xdist>=3.8.0",
]

[tool.uv.sources]
octoagent-core = { workspace = true }
octoagent-provider = { workspace = true }
octoagent-gateway = { workspace = true }
octoagent-tooling = { workspace = true }
octoagent-skills = { workspace = true }
octoagent-policy = { workspace = true }
octoagent-memory = { workspace = true }
octoagent-protocol = { workspace = true }
octoagent-sdk = { workspace = true }

[tool.uv.workspace]
members = [
    "packages/core",
    "packages/provider",
    "packages/protocol",
    "packages/tooling",
    "packages/skills",
    "packages/policy",
    "packages/memory",
    "packages/sdk",
    "apps/gateway",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["B008", "B017"]  # B008: FastAPI Depends() 标准模式; B017: 测试中 pytest.raises(Exception)

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages/core/tests", "packages/provider/tests", "packages/protocol/tests", "packages/tooling/tests", "packages/skills/tests", "packages/policy/tests", "packages/memory/tests", "apps/gateway/tests", "tests"]
consider_namespace_packages = true
# Feature 083 P3+P4：xdist **不默认启用**——5 次稳定性验证发现 task_runner 状态机
# 测试在高 CPU 负载下偶发 race condition（暴露率 ~20-40%），治本需要修 task runner
# 内部 timing 假设，超 F083 scope。
#
# 默认行为：串行执行（~93s 但 100% 稳定）。
# 启用并发：`pytest -n auto`（4-5x 提速，但 ~20% 概率 task_runner timing race）。
# 推荐使用：本地开发快速反馈用 `pytest -n auto packages/<pkg>/tests/` 子集；
# CI 全量回归用默认串行确保稳定。
# 详见 docs/codebase-architecture/testing-concurrency.md
