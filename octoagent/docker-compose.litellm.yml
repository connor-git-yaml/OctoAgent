# OctoAgent LiteLLM Proxy -- Docker Compose 配置
#
# 对齐 contracts/deployment.md SS1。
# 启动: docker compose -f docker-compose.litellm.yml up -d
# 停止: docker compose -f docker-compose.litellm.yml down
#
# ⚠️ DEPRECATED Feature 081 P0
#   Feature 080 完成 Provider 直连后，OctoAgent 不再需要 LiteLLM Proxy。
#   此 compose 文件将在 Feature 081 P4 中删除。
#   P3 期间 run-octo-home.sh / doctor-octo-home.sh / runtime_activation.py
#   会从依赖此文件解耦。
#
# 前提条件:
#   1. 复制 .env.litellm.example -> .env.litellm 并填入 LLM Provider API Keys
#   2. 复制 .env.example -> .env 并调整配置（可选）

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: octoagent-litellm
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ${OCTOAGENT_INSTANCE_ROOT:-.}/litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - ${OCTOAGENT_INSTANCE_ROOT:-.}/.env.litellm
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-octoagent-dev}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
